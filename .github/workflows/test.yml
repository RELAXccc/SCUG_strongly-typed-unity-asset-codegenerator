name: Go Generator CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Generator
        run: |
          cd generator
          go build -v -o scug cmd/scug/main.go

      - name: Run Unit Tests
        run: |
          cd generator
          go test -v ./...

      - name: Execute Generator on TestData
        run: |
          cd testdata
          # Always delete the cache before running for a clean execution
          rm -f scug_cache.json
          ../generator/scug

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Verify Generated Output & Syntax
        run: |
          # Verify that files are generated in the correct locations
          TREE_CS="testdata/Assets/Scripts/v2/UX/generated/Prefabs/EnvironmentPrefabs/Tree.cs"
          OVERLAY_CS="testdata/Assets/Scripts/v2/UX/generated/Prefabs/UIPrefabs/OverlayCanvas/CanvasOverlay.cs"

          if [ ! -f "$TREE_CS" ]; then
            echo "Error: Tree.cs not generated"
            exit 1
          fi
          if [ ! -f "$OVERLAY_CS" ]; then
            echo "Error: CanvasOverlay.cs not generated"
            exit 1
          fi

          # Basic content check
          grep "public class Tree" "$TREE_CS"
          grep "public class CanvasOverlay" "$OVERLAY_CS"

          # Basic C# Syntax Validation using dotnet-script
          # We wrap the file in a dummy check to see if it parses correctly
          echo "Validating C# syntax for generated files..."
          export PATH="$PATH:$HOME/.dotnet/tools"
          
          for f in $(find testdata/Assets/Scripts/v2/UX/generated -name "*.cs"); do
            echo "Checking $f"
            # dotnet-script can be used to evaluate if the file is syntactically valid
            # even if it can't resolve all Unity dependencies.
            # We use a simple script that references the generated file.
            echo "#load \"$f\"" > syntax_check.csx
            if ! dotnet-script syntax_check.csx --dryrun; then
              echo "Syntax error in $f"
              exit 1
            fi
          done

      - name: Verify Cache Update
        run: |
          # Check if the cache file was updated/exists
          if [ ! -f "testdata/scug_cache.json" ]; then
            echo "Error: scug_cache.json not found"
            exit 1
          fi
          # Check for specific entries in the cache (e.g., file_hashes for the processed prefabs)
          grep "Tree.prefab" testdata/scug_cache.json
          grep "CanvasOverlay.prefab" testdata/scug_cache.json
