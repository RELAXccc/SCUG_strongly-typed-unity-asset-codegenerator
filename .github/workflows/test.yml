name: Go Generator CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Generator
        run: |
          cd generator
          go build -v -o scug cmd/scug/main.go

      - name: Code Quality (go vet)
        run: |
          cd generator
          go vet ./...

      - name: Run Unit Tests & Update Coverage Badge
        run: |
          cd generator
          go test -v -coverprofile=coverage.out ./...
          
          # Extract overall coverage percentage
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          
          # Determine badge color based on coverage
          COLOR=$(awk -v cov="$COVERAGE" 'BEGIN {
            if (cov >= 80) print "brightgreen";
            else if (cov >= 60) print "yellow";
            else print "red";
          }')
          
          # Replace the Coverage badge URL in the README
          sed -i "s|!\[Coverage\].*|![Coverage](https://img.shields.io/badge/Coverage-${COVERAGE}%25-${COLOR})|g" ../README.md
          
          # Add coverage details to GitHub Step Summary
          echo "## Go Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "**Total Coverage:** ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package/Function | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | head -n -1 | awk '{print "| " $1 " | " $3 " |"}' >> $GITHUB_STEP_SUMMARY

      - name: Commit Coverage Badge
        if: github.event_name == 'push'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update test coverage badge [skip ci]" && git push)

      - name: Test Cross-Platform Builds
        run: |
          cd generator
          GOOS=windows GOARCH=amd64 go build -o scug_windows.exe cmd/scug/main.go
          GOOS=darwin GOARCH=arm64 go build -o scug_darwin cmd/scug/main.go
          GOOS=linux GOARCH=amd64 go build -o scug_linux cmd/scug/main.go

      - name: Execute Generator on TestData
        run: |
          cd testdata
          # Always delete the cache before running for a clean execution
          rm -f scug_cache.json
          ../generator/scug

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-script
        run: dotnet tool install -g dotnet-script

      - name: Verify Generated Output & Syntax
        run: |
          # Verify that files are generated in the correct locations
          TREE_CS="testdata/Assets/CustomOutput/Prefabs/EnvironmentPrefabs/Tree.cs"
          OVERLAY_CS="testdata/Assets/CustomOutput/Prefabs/UIPrefabs/OverlayCanvas/CanvasOverlay.cs"
          MAPS_CS="testdata/Assets/CustomOutput/Global/Map.cs"
          TAGS_CS="testdata/Assets/CustomOutput/Global/Tags.cs"
          RES_CS="testdata/Assets/CustomOutput/Global/Res.cs"

          if [ ! -f "$TREE_CS" ]; then echo "Error: Tree.cs not generated"; exit 1; fi
          if [ ! -f "$OVERLAY_CS" ]; then echo "Error: CanvasOverlay.cs not generated"; exit 1; fi
          if [ ! -f "$MAPS_CS" ]; then echo "Error: Map.cs not generated"; exit 1; fi
          if [ ! -f "$TAGS_CS" ]; then echo "Error: Tags.cs not generated"; exit 1; fi
          if [ ! -f "$RES_CS" ]; then echo "Error: Res.cs not generated"; exit 1; fi

          # Basic content check
          grep "public class Tree" "$TREE_CS"
          grep "public class CanvasOverlay" "$OVERLAY_CS"

          # Create a Roslyn-based Syntax Checker using dotnet-script
          cat << 'EOF' > syntax_checker.csx
          #r "nuget: Microsoft.CodeAnalysis.CSharp, 4.8.0"
          using System;
          using System.IO;
          using Microsoft.CodeAnalysis;
          using Microsoft.CodeAnalysis.CSharp;

          string filePath = Args[0];
          string code = File.ReadAllText(filePath);
          
          // ParseText only checks the grammatical structure of the code.
          // It does NOT try to resolve external references like UnityEngine.
          SyntaxTree tree = CSharpSyntaxTree.ParseText(code);
          
          bool hasErrors = false;
          foreach (var diagnostic in tree.GetDiagnostics())
          {
              if (diagnostic.Severity == DiagnosticSeverity.Error)
              {
                  Console.WriteLine($"Syntax Error in {filePath}: {diagnostic.GetMessage()} at line {diagnostic.Location.GetLineSpan().StartLinePosition.Line + 1}");
                  hasErrors = true;
              }
          }
          
          Environment.Exit(hasErrors ? 1 : 0);
          EOF

          echo "Validating C# syntax (ignoring missing references) for generated files..."
          export PATH="$PATH:$HOME/.dotnet/tools"
          
          for f in $(find testdata/Assets/CustomOutput -name "*.cs"); do
            echo "Checking syntax: $f"
            # Pass the file path as an argument to our syntax_checker script
            dotnet script syntax_checker.csx -- "$f"
            
            # If the script exits with code 1, it means syntax errors were found
            if [ $? -ne 0 ]; then
              echo "Syntax validation failed for $f"
              exit 1
            fi
          done

      - name: Verify Cache Update
        run: |
          # Check if the cache file was updated/exists
          if [ ! -f "testdata/scug_cache.json" ]; then
            echo "Error: scug_cache.json not found"
            exit 1
          fi
          # Check for specific entries in the cache (e.g., file_hashes for the processed prefabs)
          grep "Tree.prefab" testdata/scug_cache.json
          grep "CanvasOverlay.prefab" testdata/scug_cache.json
